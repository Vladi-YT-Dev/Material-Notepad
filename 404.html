<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      // Single Page Apps for GitHub Pages
      // The github.io URL 404s when redirected to a subpath that doesn't exist.
      // This script catches the 404 and redirects to index.html, 
      // preserving the URL path and hash fragment (crucial for OAuth tokens).
      sessionStorage.redirect = location.href;
      location.replace("./index.html" + location.hash);
    </script>
  </head>
  <body>
  </body>
</html>
